<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Design Style Gallery — 부놈</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,sans-serif;background:#0f0f0f;color:#fff;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* ── APP CHROME ── */
.app-nav{flex:0 0 44px;display:flex;align-items:center;gap:16px;padding:0 16px;background:#161616;border-bottom:1px solid #252525;z-index:20}
.app-logo{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.01em;white-space:nowrap}
.cat-tabs{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;flex:1}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex:0 0 auto;font-size:11px;font-weight:500;padding:4px 11px;border-radius:20px;border:none;cursor:pointer;transition:all .15s;background:#222;color:#777;letter-spacing:.03em;white-space:nowrap}
.cat-tab:hover{background:#2e2e2e;color:#ccc}
.cat-tab.active{background:#0071e3;color:#fff}
.app-count{font-size:11px;color:#444;white-space:nowrap}
.app-body{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:230px;flex:0 0 230px;background:#141414;border-right:1px solid #222;display:flex;flex-direction:column;overflow:hidden}
.search-wrap{padding:10px;border-bottom:1px solid #222}
.search-input{width:100%;background:#1e1e1e;border:1px solid #2e2e2e;color:#fff;font-size:12px;padding:7px 11px;border-radius:7px;outline:none}
.search-input:focus{border-color:#444}
.search-input::placeholder{color:#4a4a4a}
.theme-list{flex:1;overflow-y:auto;padding:6px}
.theme-list::-webkit-scrollbar{width:3px}
.theme-list::-webkit-scrollbar-thumb{background:#2e2e2e;border-radius:2px}
.cat-group-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#3a3a3a;padding:10px 8px 5px}
.theme-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .1s}
.theme-item:hover{background:#1e1e1e}
.theme-item.active{background:#1b3560}
.theme-dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
.theme-name{font-size:12px;color:#aaa;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.theme-item.active .theme-name{color:#fff}
.theme-badge{font-size:9px;color:#3a3a3a;letter-spacing:.04em}
.theme-item.active .theme-badge{color:#4a7eff}

/* ── PREVIEW PANEL ── */
.preview-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.preview-topbar{flex:0 0 38px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:#111;border-bottom:1px solid #222}
.preview-left{display:flex;align-items:center;gap:10px}
.preview-name{font-size:13px;font-weight:600;color:#fff}
.preview-variant{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:4px;background:#222;color:#666}
.preview-desc{font-size:11px;color:#444;max-width:340px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.palette-row{display:flex;gap:4px;align-items:center}
.pchip{width:18px;height:18px;border-radius:4px;border:1px solid rgba(255,255,255,.08)}
.preview-frame{flex:1;overflow-y:auto;overflow-x:hidden}
.preview-frame::-webkit-scrollbar{width:5px}
.preview-frame::-webkit-scrollbar-thumb{background:#2e2e2e;border-radius:3px}

/* ══════════════════════════════════════════════
   PREVIEW CONTENT BASE
   All theming via CSS custom properties
══════════════════════════════════════════════ */
.preview-content{
  --p-bg:#f5f5f7;--p-bg2:#fff;--p-surface:#fff;--p-surface2:#f0f0f2;
  --p-text:#1d1d1f;--p-sub:#6e6e73;--p-dim:rgba(29,29,31,.4);
  --p-accent:#0071e3;--p-accent2:#0051a0;--p-at:#fff;
  --p-nav:rgba(245,245,247,.88);--p-nav-t:#1d1d1f;
  --p-border:rgba(0,0,0,.08);--p-border2:rgba(0,0,0,.14);
  --p-shadow:0 2px 16px rgba(0,0,0,.1);
  --p-font:system-ui,-apple-system,sans-serif;
  --p-hfont:system-ui,-apple-system,sans-serif;
  --p-code:'IBM Plex Mono',monospace;
  --p-hw:600;--p-hl:1.08;--p-ht:-0.025em;
  --p-br:8px;--p-card-r:16px;--p-btn-r:980px;
  min-height:100%;
  background:var(--p-bg);
  color:var(--p-text);
  font-family:var(--p-font);
  transition:background .35s,color .35s;
}

/* ── SHARED COMPONENTS ── */
.pnav{
  position:sticky;top:0;height:44px;
  background:var(--p-nav);color:var(--p-nav-t);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--p-border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;z-index:10;
}
.pnav-brand{font-size:13px;font-weight:700;color:var(--p-nav-t);letter-spacing:-.01em}
.pnav-links{display:flex;gap:20px;list-style:none}
.pnav-links a{font-size:12px;color:var(--p-sub);text-decoration:none;cursor:pointer}
.pnav-cta{font-size:12px;color:var(--p-accent);text-decoration:none;cursor:pointer}

.phero{padding:72px 32px 60px;text-align:center;background:var(--p-bg)}
.phero-eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--p-accent);margin-bottom:14px;font-family:var(--p-font)}
.phero-title{font-family:var(--p-hfont);font-size:clamp(28px,4.5vw,52px);font-weight:var(--p-hw);line-height:var(--p-hl);letter-spacing:var(--p-ht);color:var(--p-text);max-width:600px;margin:0 auto}
.phero-sub{font-size:16px;font-weight:300;line-height:1.65;color:var(--p-sub);max-width:420px;margin:14px auto 0;font-family:var(--p-font)}
.phero-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:28px}
.pbtn{display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;padding:10px 22px;text-decoration:none;cursor:pointer;font-family:var(--p-font);border-radius:var(--p-btn-r);transition:all .15s;border:none}
.pbtn-fill{background:var(--p-accent);color:var(--p-at)}
.pbtn-fill:hover{background:var(--p-accent2)}
.pbtn-out{background:transparent;color:var(--p-accent);border:1.5px solid var(--p-accent)}

/* ══════════════════════════════════════════════
   6 CONTENT VARIANTS
══════════════════════════════════════════════ */

/* ── 1. EDITORIAL — serif rows + pullquote ── */
.variant-editorial .pcontent-section{background:var(--p-bg2);padding:0 32px 64px}
.ed-row{display:flex;align-items:center;gap:32px;padding:28px 0;border-bottom:1px solid var(--p-border)}
.ed-num{font-family:var(--p-hfont);font-size:44px;font-weight:var(--p-hw);color:var(--p-accent);letter-spacing:-.04em;line-height:1;min-width:60px}
.ed-copy{flex:1}
.ed-title{font-family:var(--p-hfont);font-size:18px;font-weight:var(--p-hw);color:var(--p-text);line-height:1.3}
.ed-desc{font-size:13px;line-height:1.7;color:var(--p-sub);margin-top:5px}
.ed-link{font-size:12px;color:var(--p-accent);text-decoration:none;white-space:nowrap;font-family:var(--p-font)}
.ed-link:hover{text-decoration:underline}
.ed-quote{margin:40px 0 0;padding:28px 32px;border-left:3px solid var(--p-accent);background:var(--p-surface);border-radius:0 var(--p-card-r) var(--p-card-r) 0}
.ed-quote-text{font-family:var(--p-hfont);font-size:17px;line-height:1.6;color:var(--p-text);font-style:italic}
.ed-quote-attr{font-size:12px;color:var(--p-sub);margin-top:10px;letter-spacing:.02em}

/* ── 2. DASHBOARD — table rows + metrics ── */
.variant-dashboard .pcontent-section{background:var(--p-bg2);padding:28px 24px 48px}
.db-table{border:1px solid var(--p-border2);border-radius:var(--p-card-r);overflow:hidden}
.db-thead{display:grid;grid-template-columns:80px 1fr 80px 80px 100px;gap:0;background:var(--p-surface2);border-bottom:1px solid var(--p-border2);padding:0 16px}
.db-th{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--p-sub);padding:10px 0}
.db-row{display:grid;grid-template-columns:80px 1fr 80px 80px 100px;gap:0;padding:0 16px;border-bottom:1px solid var(--p-border);transition:background .12s;cursor:pointer;background:var(--p-surface)}
.db-row:last-child{border-bottom:none}
.db-row:hover{background:var(--p-surface2)}
.db-cell{font-size:13px;color:var(--p-text);padding:13px 0;display:flex;align-items:center}
.db-cell.sub{color:var(--p-sub);font-size:12px}
.db-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:6px;text-transform:uppercase}
.db-badge.done{background:color-mix(in srgb,var(--p-accent) 15%,transparent);color:var(--p-accent)}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--p-accent);margin-right:6px}
.db-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}
.db-metric{background:var(--p-surface);border:1px solid var(--p-border);border-radius:var(--p-card-r);padding:18px 20px}
.db-metric-num{font-family:var(--p-hfont);font-size:32px;font-weight:var(--p-hw);color:var(--p-accent);letter-spacing:-.03em;line-height:1}
.db-metric-label{font-size:11px;color:var(--p-sub);margin-top:4px;letter-spacing:.04em}

/* ── 3. TERMINAL — code / CLI style ── */
.variant-terminal .pcontent-section{background:var(--p-bg2);padding:24px 24px 48px}
.term-window{border-radius:10px;overflow:hidden;border:1px solid var(--p-border2);box-shadow:var(--p-shadow)}
.term-titlebar{display:flex;align-items:center;gap:7px;padding:10px 14px;background:var(--p-surface2);border-bottom:1px solid var(--p-border)}
.term-btn{width:12px;height:12px;border-radius:50%}
.term-btn.red{background:#ff5f57}.term-btn.yellow{background:#febc2e}.term-btn.green{background:#28c840}
.term-title{font-size:11px;color:var(--p-sub);margin-left:8px;font-family:var(--p-code);letter-spacing:.02em}
.term-body{background:var(--p-surface);padding:20px 20px 24px;font-family:var(--p-code);font-size:13px;line-height:2}
.term-line{display:flex;gap:10px;align-items:flex-start}
.term-prompt{color:var(--p-accent);font-weight:600;user-select:none}
.term-cmd{color:var(--p-text)}
.term-out{color:var(--p-sub);padding-left:20px}
.term-out .hl{color:var(--p-accent)}
.term-cursor{display:inline-block;width:8px;height:14px;background:var(--p-accent);animation:blink 1s step-end infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.term-comment{color:var(--p-dim);font-size:12px}
.term-divider{border-top:1px solid var(--p-border);margin:8px 0}
.term-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.term-stat-box{background:var(--p-surface);border:1px solid var(--p-border2);border-radius:8px;padding:14px 16px}
.term-stat-n{font-family:var(--p-code);font-size:26px;font-weight:600;color:var(--p-accent);line-height:1}
.term-stat-k{font-family:var(--p-code);font-size:10px;color:var(--p-sub);margin-top:4px;letter-spacing:.08em;text-transform:uppercase}

/* ── 4. CINEMATIC — bold numbers, full-bleed ── */
.variant-cinematic .pcontent-section{padding:0}
.cin-band{padding:64px 40px;background:var(--p-surface)}
.cin-num{font-family:var(--p-hfont);font-size:clamp(80px,15vw,140px);font-weight:var(--p-hw);line-height:.9;letter-spacing:-.05em;color:var(--p-accent);opacity:.12;position:absolute;right:32px;top:50%;transform:translateY(-50%)}
.cin-band-inner{position:relative}
.cin-label{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--p-accent);margin-bottom:16px}
.cin-title{font-family:var(--p-hfont);font-size:clamp(24px,4vw,40px);font-weight:var(--p-hw);line-height:1.08;letter-spacing:var(--p-ht);color:var(--p-text);max-width:380px}
.cin-stats{display:flex;gap:0;margin-top:0;border-top:1px solid var(--p-border);border-bottom:1px solid var(--p-border)}
.cin-stat{flex:1;padding:28px 32px;border-right:1px solid var(--p-border)}
.cin-stat:last-child{border-right:none}
.cin-stat-n{font-family:var(--p-hfont);font-size:40px;font-weight:var(--p-hw);color:var(--p-text);letter-spacing:-.03em;line-height:1}
.cin-stat-l{font-size:11px;color:var(--p-sub);margin-top:6px;letter-spacing:.06em;text-transform:uppercase}
.cin-books{display:flex;padding:40px 32px;gap:16px;background:var(--p-bg)}
.cin-book{flex:1;padding:24px;border:1px solid var(--p-border);border-radius:var(--p-card-r);position:relative;overflow:hidden;transition:border-color .2s,transform .2s}
.cin-book:hover{border-color:var(--p-accent);transform:translateY(-4px)}
.cin-book-num{font-family:var(--p-hfont);font-size:48px;font-weight:var(--p-hw);color:var(--p-accent);letter-spacing:-.04em;line-height:1;opacity:.2;position:absolute;bottom:12px;right:16px}
.cin-book-tag{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--p-accent);margin-bottom:8px}
.cin-book-title{font-family:var(--p-hfont);font-size:15px;font-weight:var(--p-hw);color:var(--p-text);line-height:1.4}
.cin-book-desc{font-size:12px;color:var(--p-sub);margin-top:6px;line-height:1.6}

/* ── 5. PLAYFUL — icon cards + progress ── */
.variant-playful .pcontent-section{background:var(--p-bg2);padding:28px 24px 48px}
.play-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.play-card{background:var(--p-surface);border-radius:calc(var(--p-card-r) * 1.3);padding:22px 20px 20px;border:1.5px solid var(--p-border);transition:transform .2s,box-shadow .2s;cursor:pointer}
.play-card:hover{transform:translateY(-5px);box-shadow:0 12px 32px rgba(0,0,0,.12)}
.play-icon{font-size:28px;margin-bottom:12px}
.play-vol{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--p-accent);margin-bottom:6px}
.play-title{font-family:var(--p-hfont);font-size:16px;font-weight:var(--p-hw);color:var(--p-text);line-height:1.3}
.play-desc{font-size:12px;color:var(--p-sub);margin-top:6px;line-height:1.6}
.play-chip{display:inline-flex;margin-top:12px;font-size:10px;font-weight:700;letter-spacing:.06em;padding:3px 9px;border-radius:20px;background:color-mix(in srgb,var(--p-accent) 12%,transparent);color:var(--p-accent)}
.play-progress{background:var(--p-surface);border-radius:var(--p-card-r);border:1px solid var(--p-border);padding:22px 24px}
.play-progress-title{font-size:13px;font-weight:600;color:var(--p-text);margin-bottom:16px}
.play-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.play-bar-label{font-size:12px;color:var(--p-sub);width:52px;flex:0 0 52px}
.play-bar-track{flex:1;height:6px;background:var(--p-surface2,color-mix(in srgb,var(--p-accent) 12%,transparent));border-radius:3px;overflow:hidden}
.play-bar-fill{height:100%;border-radius:3px;background:var(--p-accent);transition:width .6s cubic-bezier(.22,1,.36,1)}
.play-bar-val{font-size:12px;color:var(--p-accent);font-weight:600;width:32px;text-align:right}

/* ── 6. REFINED — bordered cards + feature list ── */
.variant-refined .pcontent-section{background:var(--p-bg2);padding:32px 28px 56px}
.ref-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.ref-card{background:var(--p-surface);border:1px solid var(--p-border2);border-radius:var(--p-card-r);padding:24px 22px;transition:box-shadow .2s,transform .2s}
.ref-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.1);transform:translateY(-3px)}
.ref-card-num{font-family:var(--p-hfont);font-size:36px;font-weight:var(--p-hw);color:var(--p-accent);letter-spacing:-.04em;line-height:1}
.ref-card-title{font-family:var(--p-hfont);font-size:15px;font-weight:var(--p-hw);color:var(--p-text);margin-top:10px;line-height:1.35}
.ref-card-desc{font-size:12px;color:var(--p-sub);margin-top:6px;line-height:1.6}
.ref-features{border:1px solid var(--p-border2);border-radius:var(--p-card-r);overflow:hidden}
.ref-feat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--p-surface2);border-bottom:1px solid var(--p-border)}
.ref-feat-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--p-sub)}
.ref-feat-row{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--p-border);background:var(--p-surface);transition:background .12s;cursor:pointer}
.ref-feat-row:last-child{border-bottom:none}
.ref-feat-row:hover{background:var(--p-surface2)}
.ref-feat-icon{width:28px;height:28px;border-radius:8px;background:color-mix(in srgb,var(--p-accent) 12%,transparent);display:flex;align-items:center;justify-content:center;font-size:13px;flex:0 0 28px}
.ref-feat-text{flex:1}
.ref-feat-name{font-size:13px;font-weight:500;color:var(--p-text)}
.ref-feat-sub{font-size:11px;color:var(--p-sub);margin-top:2px}
.ref-feat-badge{font-size:10px;font-weight:700;color:var(--p-accent);letter-spacing:.06em;padding:2px 8px;border-radius:5px;background:color-mix(in srgb,var(--p-accent) 12%,transparent)}

/* ── SHARED CTA SECTION ── */
.pcta-section{padding:52px 32px;text-align:center;background:var(--p-accent)}
.pcta-title{font-family:var(--p-hfont);font-size:clamp(20px,3.5vw,32px);font-weight:var(--p-hw);line-height:1.1;color:var(--p-at);letter-spacing:var(--p-ht)}
.pcta-btn{display:inline-flex;align-items:center;margin-top:22px;font-size:14px;font-weight:600;padding:11px 26px;border-radius:var(--p-btn-r);background:var(--p-at);color:var(--p-accent);text-decoration:none;transition:opacity .15s}
.pcta-btn:hover{opacity:.85}

/* ══════════════════════════════════════════════
   ENTRY ANIMATIONS
   Applied to .preview-content via JS class
══════════════════════════════════════════════ */
.preview-content *{animation-fill-mode:both}

/* fade-up — Apple, Notion, Airbnb, Clay */
.anim-fade .phero-eyebrow{animation:fadeUp .6s .05s}
.anim-fade .phero-title{animation:fadeUp .7s .15s}
.anim-fade .phero-sub{animation:fadeUp .7s .25s}
.anim-fade .phero-btns{animation:fadeUp .7s .35s}
.anim-fade .pcontent-section > *{animation:fadeUp .65s calc(.4s + var(--stagger,0s))}
.anim-fade .pcta-section{animation:fadeUp .7s .6s}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* slide-in — Linear, IBM, Dashboard types */
.anim-slide .phero-eyebrow{animation:slideIn .4s .0s}
.anim-slide .phero-title{animation:slideIn .45s .08s}
.anim-slide .phero-sub{animation:slideIn .45s .14s}
.anim-slide .phero-btns{animation:slideIn .45s .2s}
.anim-slide .pcontent-section > *{animation:slideIn .4s calc(.25s + var(--stagger,0s))}
.anim-slide .pcta-section{animation:slideIn .4s .5s}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}

/* dramatic — Ferrari, SpaceX, Cinematic */
.anim-dramatic .phero-eyebrow{animation:dramatic .9s .1s}
.anim-dramatic .phero-title{animation:dramatic 1.1s .3s}
.anim-dramatic .phero-sub{animation:dramatic 1s .55s}
.anim-dramatic .phero-btns{animation:dramatic .9s .75s}
.anim-dramatic .pcontent-section > *{animation:dramatic 1s calc(.8s + var(--stagger,0s))}
.anim-dramatic .pcta-section{animation:dramatic 1s 1.1s}
@keyframes dramatic{from{opacity:0;transform:scale(1.03)}to{opacity:1;transform:none}}

/* snap — Vercel, Uber, xAI */
.anim-snap .phero-eyebrow{animation:snap .18s .0s}
.anim-snap .phero-title{animation:snap .2s .04s}

.anim-terminal .phero-eyebrow{animation:termReveal .2s .05s}

/* ══════════════════════════════════════════════
   APPLY THEME
══════════════════════════════════════════════ */
let currentAnim = '';

function applyTheme(theme) {
  // Sidebar active
  document.querySelectorAll('.theme-item').forEach(el => el.classList.toggle('active', el.dataset.id === theme.id));

  const pc = document.getElementById('previewContent');

  // Remove old anim class
  if (currentAnim) pc.classList.remove(currentAnim, 'variant-'+currentThemeVariant);
  // Force reflow
  void pc.offsetWidth;

  // CSS vars
  const vars = {
    '--p-bg':theme.bg,'--p-bg2':theme.bg2,'--p-surface':theme.surface,'--p-surface2':theme.surface2,
    '--p-text':theme.text,'--p-sub':theme.sub,'--p-dim':theme.dim,
    '--p-accent':theme.accent,'--p-accent2':theme.accent2,'--p-at':theme.at,
    '--p-nav':theme.nav,'--p-nav-t':theme.navT,
    '--p-border':theme.border,'--p-border2':theme.border2,
    '--p-shadow':theme.shadow,
    '--p-font':theme.font,'--p-hfont':theme.hfont,
    '--p-hw':theme.hw,'--p-hl':theme.hl,'--p-ht':theme.ht,
    '--p-br':theme.br,'--p-card-r':theme.cardR,'--p-btn-r':theme.btnR,
  };
  Object.entries(vars).forEach(([k,v]) => pc.style.setProperty(k,v));

  // Variant content
  document.getElementById('variantContent').innerHTML = contentHTML(theme.variant);

  // Add variant + anim classes
  pc.classList.add('variant-'+theme.variant, theme.anim);
  currentAnim = theme.anim;
  currentThemeVariant = theme.variant;

  // Topbar
  document.getElementById('previewName').textContent = theme.name;
  document.getElementById('previewVariant').textContent = variantLabels[theme.variant];
  document.getElementById('previewDesc').textContent = theme.desc;

  // Palette
  document.getElementById('paletteRow').innerHTML =
    theme.palette.map(c=>`<div class="pchip" style="background:${c}"></div>`).join('');

  // Scroll to top
  document.getElementById('previewFrame').scrollTop = 0;
}

let currentThemeVariant = 'refined';

/* ══════════════════════════════════════════════
   SIDEBAR BUILD
══════════════════════════════════════════════ */
const catOrder = ['ai','dev','infra','design','fintech','enterprise','cars','korean'];
const catLabels2 = {ai:'AI & ML',dev:'Dev Tools',infra:'Infrastructure',design:'Design',fintech:'Fintech',enterprise:'Enterprise',cars:'Cars',korean:'🇰🇷 Korean'};

function buildSidebar(ids) {
  const list = document.getElementById('themeList');
  list.innerHTML = '';
  let count = 0;
  catOrder.forEach(cat => {
    const items = T.filter(t => t.cat === cat && ids.includes(t.id));
    if (!items.length) return;
    count += items.length;
    const g = document.createElement('div');
    g.innerHTML = `<div class="cat-group-label">${catLabels2[cat]}</div>`;
    items.forEach(t => {
      const el = document.createElement('div');
      el.className = 'theme-item';
      el.dataset.id = t.id;
      el.innerHTML = `<div class="theme-dot" style="background:${t.accent}"></div><span class="theme-name">${t.name}</span><span class="theme-badge">${t.dark?'dark':'light'}</span>`;
      el.addEventListener('click', () => applyTheme(t));
      g.appendChild(el);
    });
    list.appendChild(g);
  });
  document.getElementById('countDisplay').textContent = count+'개';
}

/* ══════════════════════════════════════════════
   FILTERS
══════════════════════════════════════════════ */
let activeCat = 'all', searchQ = '';

function refresh() {
  const ids = T
    .filter(t => activeCat === 'all' || t.cat === activeCat)
    .filter(t => t.name.toLowerCase().includes(searchQ.toLowerCase()))
    .map(t => t.id);
  buildSidebar(ids);
}

document.getElementById('catTabs').addEventListener('click', e => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeCat = tab.dataset.cat;
  refresh();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  refresh();
});

/* INIT */
refresh();
applyTheme(T.find(t => t.id === 'apple'));
</script>
